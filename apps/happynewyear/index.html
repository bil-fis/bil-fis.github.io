        <style>
    /* css代码 */
    .lantern {
    /*width: 300px;  */                                  /* 宽度 */
    /*height: 300px; */                                   /* 高度 */
    /*border:#666 1px solid;*/
    /*border-radius:50%;*/
    opacity: 0.1;                                   /* 不透明度 */
    overflow: hidden;                               /* 溢出隐藏 */
   /* margin: 25% auto; */                              /* 外边距 */
  
    /* IE10、Firefox and Opera，IE9以及更早的版本不支持 */
    animation-name: breath;                         /* 动画名称 */
    animation-duration: 1200ms;                         /* 动画时长3秒 */
    animation-timing-function: ease-in-out;         /* 动画速度曲线：以低速开始和结束 */
    animation-iteration-count: infinite;            /* 播放次数：无限 */
 
    /* Safari and Chrome */
    -webkit-animation-name: breath;                 /* 动画名称 */
    -webkit-animation-duration: 1200ms;                 /* 动画时长3秒 */
    -webkit-animation-timing-function: ease-in-out; /* 动画速度曲线：以低速开始和结束 */
    -webkit-animation-iteration-count: infinite;    /* 播放次数：无限 */
}

    .playmusic {
    /*width: 300px;  */                                  /* 宽度 */
    /*height: 300px; */                                   /* 高度 */
    /*border:#666 1px solid;*/
    /*border-radius:50%;*/                                   /* 不透明度 */
    overflow: hidden;                               /* 溢出隐藏 */
   /* margin: 25% auto; */                              /* 外边距 */
  
    /* IE10、Firefox and Opera，IE9以及更早的版本不支持 */
    animation-name: xz;                         /* 动画名称 */
    animation-duration: 1000ms;                         /* 动画时长3秒 */
    animation-timing-function: linear;         /* 动画速度曲线：以低速开始和结束 */
    animation-iteration-count: infinite;            /* 播放次数：无限 */
 
    /* Safari and Chrome */
    -webkit-animation-name: xz;                 /* 动画名称 */
    -webkit-animation-duration: 1000ms;                 /* 动画时长3秒 */
    -webkit-animation-timing-function: linear; /* 动画速度曲线：以低速开始和结束 */
    -webkit-animation-iteration-count: infinite;    /* 播放次数：无限 */
}
 
 @keyframes xz {
    from {transform:rotate(0deg);}
    to {transform:rotate(360deg);}
 }
 @-webkit-keyframes xz{
    from {transform:rotate(0deg);}
    to {transform:rotate(360deg);}
 }
 
@keyframes breath {
    from { opacity: 0.1; }                          /* 动画开始时的不透明度 */
    50%  { opacity:   1; }                          /* 动画50% 时的不透明度 */
    to   { opacity: 0.1; }                          /* 动画结束时的不透明度 */    
}
 
@-webkit-keyframes breath {
    from { opacity: 0.1; }                          /* 动画开始时的不透明度 */
    50%  { opacity:   1; }                          /* 动画50% 时的不透明度 */
    to   { opacity: 0.1; }                          /* 动画结束时的不透明度 */
}

.big{
  font-size:60px;
}
